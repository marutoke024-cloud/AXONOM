<!DOCTYPE html>
<html lang="ja" data-theme="greige">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AXONOM — Spatial Mapping Studio for Data Centers</title>
  <meta name="description" content="データセンターのフロアマップを、積み木のように直感的に作れるマッピングスタジオ。">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#EDEAE4">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-maskable.svg">

  <!-- フォント：欧文 Space Grotesk ＋ 和文 Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap">

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/home.css">

  <!-- Three.js は ES Modules、GSAP はグローバルスクリプトとして読み込む -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
</head>
<body>

  <!-- ===== 3D背景キャンバス（Three.jsが描画する） ===== -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- ===== ヘッダー ===== -->
  <header class="site-header">
    <a class="brand" href="./" aria-label="AXONOM home">
      <!-- ロゴマーク：アイコンと同じ積層プレートのミニ版 -->
      <svg class="brand-mark" viewBox="0 0 40 40" aria-hidden="true">
        <polygon points="20,22 34,29 20,36 6,29" fill="var(--color-ink)"/>
        <polygon points="20,13 34,20 20,27 6,20" fill="var(--color-surface-2)"/>
        <polygon points="20,4 34,11 20,18 6,11" fill="var(--color-accent)"/>
      </svg>
      <span class="brand-name">AXONOM</span>
    </a>

    <!-- テーマパレット切替（5色） -->
    <div class="theme-picker" role="group" aria-label="Theme palette">
      <span class="theme-picker-label">Palette</span>
      <button class="theme-dot is-active" data-theme-name="greige"  style="--dot:#c96f4a" aria-label="Greige theme"></button>
      <button class="theme-dot" data-theme-name="sage"     style="--dot:#5f8a68" aria-label="Sage theme"></button>
      <button class="theme-dot" data-theme-name="mist"     style="--dot:#4a6fa5" aria-label="Mist theme"></button>
      <button class="theme-dot" data-theme-name="sand"     style="--dot:#a8842e" aria-label="Sand theme"></button>
      <button class="theme-dot" data-theme-name="lavender" style="--dot:#7b6cd9" aria-label="Lavender theme"></button>
    </div>
  </header>

  <!-- ===== ヒーロー ===== -->
  <main class="hero">
    <p class="eyebrow reveal">Spatial Mapping Studio</p>

    <h1 class="hero-title">
      <span class="line"><span class="line-inner">Build your facility,</span></span>
      <span class="line"><span class="line-inner accent">block by block.</span></span>
    </h1>

    <p class="hero-copy reveal">
      フロアマップを、積み木のように直感的に。<br>
      平面図から積層の俯瞰図まで、ひと目で伝わる一枚へ。
    </p>

    <div class="hero-actions reveal">
      <a class="btn-primary" id="start-btn" href="editor.html">
        Start Creating
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M3 9h12m0 0L9.5 3.5M15 9l-5.5 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <span class="hero-note">No sign-up. Works offline as a PWA.</span>
    </div>
  </main>

  <!-- ===== フッター：機能のティッカー的メタ情報 ===== -->
  <footer class="site-footer">
    <ul class="meta-list">
      <li class="reveal">Plan View</li>
      <li class="reveal">Axonometric</li>
      <li class="reveal">Stacked Floors</li>
      <li class="reveal">PNG Export</li>
    </ul>
    <p class="meta-version reveal">v0.1 — Phase 1</p>
  </footer>

  <!-- ===== ページ遷移用オーバーレイ ===== -->
  <div class="page-transition" aria-hidden="true"></div>

  <script type="module" src="js/home.js"></script>
</body>
</html>
