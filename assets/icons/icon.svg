<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    AXONOM PWA アイコン（現代アート風）。
    積層フロアを軸測投影（アクソノメトリック）で抽象化した構成。
    ライトグレージュの地に、インク色のプレートとテラコッタの差し色。
  -->
  <defs>
    <!-- プレートにわずかな立体感を与えるグラデーション -->
    <linearGradient id="plateShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A362F"/>
      <stop offset="1" stop-color="#2D2A26"/>
    </linearGradient>
  </defs>

  <!-- 背景：ライトグレージュ。角丸はOS側マスクに任せるためフルブリード -->
  <rect width="512" height="512" fill="#EDEAE4"/>

  <!-- 紙のような微妙なトーン差（大きな円弧） -->
  <circle cx="420" cy="80" r="180" fill="#E5E1D9"/>

  <!-- ===== 積層フロアプレート（下から上へ） ===== -->
  <!-- 最下層：インク色のプレート -->
  <g>
    <polygon points="256,316 416,396 256,476 96,396" fill="url(#plateShade)"/>
    <polygon points="96,396 256,476 256,492 96,412" fill="#211E1B"/>
    <polygon points="416,396 256,476 256,492 416,412" fill="#171512"/>
  </g>

  <!-- 中層：グレージュトーンのプレート（少し浮かせる） -->
  <g>
    <polygon points="256,212 416,292 256,372 96,292" fill="#CFC9BE"/>
    <polygon points="96,292 256,372 256,388 96,308" fill="#B8B1A4"/>
    <polygon points="416,292 256,372 256,388 416,308" fill="#A8A093"/>
  </g>

  <!-- 最上層：テラコッタの差し色プレート -->
  <g>
    <polygon points="256,108 416,188 256,268 96,188" fill="#C96F4A"/>
    <polygon points="96,188 256,268 256,284 96,204" fill="#B05A38"/>
    <polygon points="416,188 256,268 256,284 416,204" fill="#9C4E2F"/>
  </g>

  <!-- 最上層に載る小さなブロック（ラックの抽象表現） -->
  <g>
    <polygon points="256,96 296,116 256,136 216,116" fill="#F4F1EB"/>
    <polygon points="216,116 256,136 256,168 216,148" fill="#DDD8CE"/>
    <polygon points="296,116 256,136 256,168 296,148" fill="#C6C0B3"/>
  </g>

  <!-- 構図を締める小さな幾何アクセント -->
  <circle cx="98" cy="108" r="14" fill="#2D2A26"/>
  <rect x="392" y="448" width="28" height="6" fill="#C96F4A"/>
</svg>
